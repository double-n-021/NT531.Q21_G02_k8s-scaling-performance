apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: target-app-ingress
  namespace: nt531-env
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: target-app-service
            port:
              number: 80
