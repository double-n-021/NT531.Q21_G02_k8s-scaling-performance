apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: target-app-proactive
  namespace: nt531-env
spec:
  scaleTargetRef:
    name: target-app
  pollingInterval:  15    # (Polling) 15 giây kiểm tra tín hiệu AI một lần
  cooldownPeriod:   300   # (Cooldown) Đợi 5 phút mới giảm Pod
  minReplicaCount:  2     # Mức tối thiểu
  maxReplicaCount:  6    # Mức tối đa
  advanced:
    restoreToOriginalReplicaCount: true
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
      metricName: predicted_load_signal
      # (Ngưỡng hành động) Cứ mỗi 10 đơn vị dự báo tải thì thêm 1 Pod
      threshold: '6' 
      query: |
        sum(predicted_traffic_demand)
  advanced:
    restoreToOriginalReplicaCount: true
    horizontalPodAutoscalerConfig: # Thêm đoạn này vào
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300 # Đợi 5 phút ổn định rồi mới bắt đầu tính chuyện giảm
          policies:
          - type: Pods
            value: 1          # Mỗi lần chỉ được phép giảm tối đa 1 Pod
            periodSeconds: 60 # Khoảng thời gian chờ giữa mỗi lần giảm (60 giây)
          selectPolicy: Min   # Ưu tiên chọn chính sách nào giảm ít Pod nhất
