# Mock exporter: cung cấp metric predicted_traffic_demand cho KEDA (KB3).
# Áp dụng SAU khi namespace nt531-env đã tồn tại.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-mock-script
  namespace: nt531-env
data:
  mock_agent.py: |
    import time
    import json
    import urllib.request
    import urllib.parse
    from prometheus_client import start_http_server, Gauge

    PREDICTED_LOAD = Gauge(
        "predicted_traffic_demand",
        "AI predicted load for KEDA Prometheus scaler (Linear Extrapolation)",
    )

    PROM_URL = "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/api/v1/query"
    # Lấy tổng tốc độ nhận request của các pod ứng dụng trong 30s qua
    QUERY = "sum(rate(http_requests_total{endpoint='/collect'}[30s]))"

    def get_current_rate():
        try:
            url = f"{PROM_URL}?query={urllib.parse.quote(QUERY)}"
            req = urllib.request.Request(url)
            with urllib.request.urlopen(req, timeout=5) as response:
                data = json.loads(response.read().decode())
                if data.get('status') == 'success' and data['data']['result']:
                    return float(data['data']['result'][0]['value'][1])
        except Exception as e:
            print(f"Query error / System not generating load: {e}")
        return 0.0

    if __name__ == "__main__":
        start_http_server(8001, addr="0.0.0.0")
        print("Proactive AI Agent listening on :8001 /metrics", flush=True)
        
        history_rates = []
        
        while True:
            current_rate = get_current_rate()
            history_rates.append(current_rate)
            
            # Lưu lịch sử 4 điểm (mỗi điểm cách nhau 15s) -> 1 phút
            if len(history_rates) > 4:
                history_rates.pop(0)
            
            prediction = current_rate
            if len(history_rates) >= 2:
                # Tính độ dốc (Slope): (Giá trị mới nhất - Cũ nhất) / Số khoảng thời gian
                # Tốc độ thay đổi per 15s interval
                trend_per_interval = (history_rates[-1] - history_rates[0]) / (len(history_rates) - 1)
                
                # Dự báo tải cho 60 giây tương lai (4 interval)
                prediction = current_rate + (trend_per_interval * 4)
            
            # KEDA cần scale an toàn, tránh âm và luôn giữ buffer tối thiểu (+2)
            final_predict = max(current_rate, prediction) + 2
            
            # Làm tròn số để nhìn logs cho rõ
            final_predict = int(final_predict)
            
            PREDICTED_LOAD.set(final_predict)
            print(f"Current Rate: {current_rate:.2f} req/s | Trend: {prediction - current_rate:.2f} | KEDA Predict: {final_predict} req/s", flush=True)
            
            time.sleep(15)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-mock-predictor
  namespace: nt531-env
  labels:
    app: ai-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agent
  template:
    metadata:
      labels:
        app: ai-agent
    spec:
      containers:
        - name: agent
          image: python:3.11-slim
          ports:
            - name: metrics
              containerPort: 8001
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --no-cache-dir prometheus_client -q
              exec python -u /app/mock_agent.py
          volumeMounts:
            - name: script
              mountPath: /app
      volumes:
        - name: script
          configMap:
            name: ai-mock-script
---
apiVersion: v1
kind: Service
metadata:
  name: ai-mock-predictor
  namespace: nt531-env
  labels:
    app: ai-agent
    nt531.io/scrape: predicted-load
spec:
  selector:
    app: ai-agent
  ports:
    - name: metrics
      port: 8001
      targetPort: 8001
