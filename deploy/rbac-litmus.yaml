---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-delete-sa
  namespace: nt531-env
  labels:
    name: pod-delete-sa
    app.kubernetes.io/part-of: litmus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-delete-role
  namespace: nt531-env
  labels:
    name: pod-delete-role
    app.kubernetes.io/part-of: litmus
rules:
# Cấp quyền thao tác với Pods, Events và các tài nguyên của Chaos
- apiGroups: ["", "litmuschaos.io", "batch", "apps"]
  resources: ["pods", "deployments", "jobs", "events", "chaosengines", "chaosexperiments", "chaosresults"]
  verbs: ["create", "list", "get", "patch", "update", "delete", "deletecollection"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-delete-rolebinding
  namespace: nt531-env
  labels:
    name: pod-delete-rolebinding
    app.kubernetes.io/part-of: litmus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-delete-role
subjects:
- kind: ServiceAccount
  name: pod-delete-sa
  namespace: nt531-env
