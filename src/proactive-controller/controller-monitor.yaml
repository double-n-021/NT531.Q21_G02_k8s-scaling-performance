apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: predictive-controller-monitor
  namespace: monitoring
  labels:
    release: monitoring # Khớp với label của Prometheus Operator bạn đang dùng
spec:
  selector:
    matchLabels:
      app: predictive-controller
  endpoints:
  - port: metrics
    interval: 10s # Quét dữ liệu AI mỗi 10s
    path: /metrics
