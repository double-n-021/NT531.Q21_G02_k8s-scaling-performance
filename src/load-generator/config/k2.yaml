# config/k2.yaml
# ============================================================
# NT531 Load Generator — Cấu hình chuẩn cho K=2 Pods
# ============================================================
target:
  host: "http://localhost:8000"     # Hãy đổi thành IP Ingress của k3s
  endpoint: "/collect"

# --- Tham số từ Calibration K=2 ---
calibration:
  lambda_normal: 1        # tải ổn định (1 req/s)
  lambda_cap: 4           # tải kịch trần k=2 (~4 req/s)
  lambda_max: 10          # tải đỉnh spike (10 req/s) — Đủ để gây nghẽn nặng cho K=2

# --- Traffic Profiles ---
profiles:
  stable:
    duration: 300
    stages:
      - {duration: 300, users: 1, spawn_rate: 1}

  ramp:
    duration: 480
    stages:
      - {duration: 60,  users: 1,   spawn_rate: 1}     # warm-up 
      - {duration: 360, users: 10,  spawn_rate: 0.1}   # ramp tuyến tính trong 6 phút
      - {duration: 60,  users: 1,   spawn_rate: 5}     # cool-down

  spike:
    duration: 300
    stages:
      - {duration: 60,  users: 1,   spawn_rate: 1}     # baseline
      - {duration: 1,   users: 10,  spawn_rate: 10}    # nhảy vọt
      - {duration: 60,  users: 10,  spawn_rate: 1}     # GIỮ ĐỈNH 60s (theo đề cương)
      - {duration: 179, users: 1,   spawn_rate: 10}    # về baseline

  spike_recovery:
    duration: 420
    stages:
      - {duration: 60,  users: 1,   spawn_rate: 1}     # baseline
      - {duration: 1,   users: 10,  spawn_rate: 10}    # nhảy vọt
      - {duration: 60,  users: 10,  spawn_rate: 1}     # giữ spike 60s (theo đề cương)
      - {duration: 1,   users: 1,   spawn_rate: 10}    # drop nhanh
      - {duration: 298, users: 1,   spawn_rate: 1}     # QUAN SÁT RECOVERY (MTTR)

  oscillating:
    duration: 300
    low_users: 1           
    high_users: 7          # A = lambda_sat - lambda_normal = 4 - 1 = 3 -> Peak = 1 + 2*3 = 7
    cycle_duration: 120    

experiment:
  runs_per_combo: 5        
  reset_wait: 420          
  csv_dir: "results"
