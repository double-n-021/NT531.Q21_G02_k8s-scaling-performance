target:
  host: "http://100.99.156.17:8888"
  endpoint: "/collect"

calibration:
  lambda_normal: 1
  lambda_cap: 4
  lambda_max: 10

profiles:
  ramp:
    duration: 480
    stages:
      - {duration: 60,  users: 1,   spawn_rate: 1}
      - {duration: 360, users: 10,  spawn_rate: 0.1}
      - {duration: 60,  users: 1,   spawn_rate: 5}

  spike:
    duration: 300
    stages:
      - {duration: 60,  users: 1,   spawn_rate: 1}
      - {duration: 1,   users: 10,  spawn_rate: 10}
      - {duration: 60,  users: 10,  spawn_rate: 1}
      - {duration: 179, users: 1,   spawn_rate: 10}

  spike_recovery:
    duration: 420
    stages:
      - {duration: 60,  users: 1,   spawn_rate: 1}
      - {duration: 1,   users: 10,  spawn_rate: 10}
      - {duration: 60,  users: 10,  spawn_rate: 1}
      - {duration: 1,   users: 1,   spawn_rate: 10}
      - {duration: 298, users: 1,   spawn_rate: 1}

  oscillating:
    duration: 300
    low_users: 1
    high_users: 7
    cycle_duration: 120

experiment:
  runs_per_combo: 3
  reset_wait: 180
  csv_dir: "results"
