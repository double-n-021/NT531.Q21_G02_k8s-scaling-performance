# config/k4.yaml
# ============================================================
# NT531 Load Generator — Cấu hình chuẩn cho K=4 Pods (Scaled 2x)
# ============================================================
target:
  host: "http://localhost:8000"     # Hãy đổi thành IP Ingress của k3s
  endpoint: "/collect"

calibration:
  lambda_normal: 2        
  lambda_cap: 8           
  lambda_max: 20          

profiles:
  stable:
    duration: 300
    stages:
      - {duration: 300, users: 2, spawn_rate: 2}

  ramp:
    duration: 480
    stages:
      - {duration: 60,  users: 2,   spawn_rate: 2}     
      - {duration: 360, users: 20,  spawn_rate: 0.1}   
      - {duration: 60,  users: 2,   spawn_rate: 10}    

  spike:
    duration: 300
    stages:
      - {duration: 60,  users: 2,   spawn_rate: 2}     
      - {duration: 1,   users: 20,  spawn_rate: 20}    
      - {duration: 60,  users: 20,  spawn_rate: 2}     
      - {duration: 179, users: 2,   spawn_rate: 20}    

  spike_recovery:
    duration: 420
    stages:
      - {duration: 60,  users: 2,   spawn_rate: 2}     
      - {duration: 1,   users: 20,  spawn_rate: 20}    
      - {duration: 60,  users: 20,  spawn_rate: 2}     
      - {duration: 1,   users: 2,   spawn_rate: 20}    
      - {duration: 298, users: 2,   spawn_rate: 2}     

  oscillating:
    duration: 300
    low_users: 2          
    high_users: 14         
    cycle_duration: 120    

experiment:
  runs_per_combo: 3        
  reset_wait: 180          
  csv_dir: "results"
