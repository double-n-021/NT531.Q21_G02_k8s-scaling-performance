# config/k6.yaml
# ============================================================
# NT531 Load Generator — Cấu hình chuẩn cho K=6 Pods (Scaled 3x)
# ============================================================
target:
  host: "http://localhost:8000"     
  endpoint: "/collect"

calibration:
  lambda_normal: 3        
  lambda_cap: 12           
  lambda_max: 30          

profiles:
  stable:
    duration: 300
    stages:
      - {duration: 300, users: 3, spawn_rate: 3}

  ramp:
    duration: 480
    stages:
      - {duration: 60,  users: 3,   spawn_rate: 3}     
      - {duration: 360, users: 30,  spawn_rate: 0.1}   
      - {duration: 60,  users: 3,   spawn_rate: 15}    

  spike:
    duration: 300
    stages:
      - {duration: 60,  users: 3,   spawn_rate: 3}     
      - {duration: 1,   users: 30,  spawn_rate: 30}    
      - {duration: 60,  users: 30,  spawn_rate: 3}     
      - {duration: 179, users: 3,   spawn_rate: 30}    

  spike_recovery:
    duration: 420
    stages:
      - {duration: 60,  users: 3,   spawn_rate: 3}     
      - {duration: 1,   users: 30,  spawn_rate: 30}    
      - {duration: 60,  users: 30,  spawn_rate: 3}     
      - {duration: 1,   users: 3,   spawn_rate: 30}    
      - {duration: 298, users: 3,   spawn_rate: 3}     

  oscillating:
    duration: 300
    low_users: 3          
    high_users: 21         
    cycle_duration: 120    

experiment:
  runs_per_combo: 5        
  reset_wait: 420          
  csv_dir: "results"
